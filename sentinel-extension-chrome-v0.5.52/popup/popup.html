<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="../assets/logo-horizontal.png" alt="Guardrail Sentinel" class="header-logo">
    <div class="user-info" id="user-info">
      <div class="user-email" id="user-email"></div>
      <div class="user-org" id="user-org"></div>
      <span class="user-plan" id="user-plan"></span>
    </div>
  </div>

  <!-- Stats grid — hidden until signed in -->
  <div class="stats hidden" id="stats-grid">
    <div class="stat">
      <div class="stat-value allow" id="scanned-count">0</div>
      <div class="stat-label">Scanned Today</div>
    </div>
    <div class="stat">
      <div class="stat-value warn" id="warned-count">0</div>
      <div class="stat-label">Warnings</div>
    </div>
    <div class="stat">
      <div class="stat-value block" id="blocked-count">0</div>
      <div class="stat-label">Blocked</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="latency">0ms</div>
      <div class="stat-label">Avg Latency</div>
    </div>
  </div>

  <!-- Signed-out CTA — hidden when signed in -->
  <div class="signed-out-cta hidden" id="signed-out-cta">
    <div class="cta-icon">
      <svg width="32" height="32" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
        <rect x="3" y="1" width="10" height="14" rx="2"/>
        <circle cx="8" cy="6.5" r="2"/>
        <path d="M4.5 12.5c0-2 1.5-3 3.5-3s3.5 1 3.5 3"/>
      </svg>
    </div>
    <div class="cta-text">Sign in to your Guardrail user account or <a id="cta-register-link" class="cta-link" href="#">register here</a>.</div>
    <button class="cta-button" id="cta-signin-btn">Sign In</button>
  </div>

  <!-- Environment selector — visible to admin/super-admin staff only -->
  <div class="env-selector hidden" id="env-selector">
    <label class="env-label" for="env-select">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="svg-icon-fixed">
        <path d="M2 2h4l2 3H2V2Z"/>
        <path d="M2 5h12v8a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V5Z"/>
      </svg>
      Environment
    </label>
    <select id="env-select">
      <option value="production">Production</option>
      <option value="development">Development</option>
    </select>
  </div>

  <!-- Org switcher — visible when user belongs to multiple orgs -->
  <div class="org-switcher hidden" id="org-switcher">
    <label class="env-label" for="org-select">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="svg-icon-fixed">
        <path d="M8 1L1 5v6l7 4 7-4V5L8 1Z"/>
        <path d="M1 5l7 4 7-4"/>
        <line x1="8" y1="9" x2="8" y2="15"/>
      </svg>
      Organization
    </label>
    <select id="org-select"></select>
  </div>

  <!-- Managed-by org badge — visible when user belongs to a single org -->
  <div class="managed-by hidden" id="managed-by">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="svg-icon-fixed">
      <path d="M8 1L1 5v6l7 4 7-4V5L8 1Z"/>
      <path d="M1 5l7 4 7-4"/>
      <line x1="8" y1="9" x2="8" y2="15"/>
    </svg>
    <span>Managed by <strong id="managed-by-name"></strong></span>
  </div>

  <div class="last-activity" id="last-activity"></div>

  <!-- Action bar — 3 icon buttons -->
  <div class="action-bar" id="action-bar">
    <button class="action-btn" id="settings-link" title="Settings">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M13.3 10a1.1 1.1 0 0 0 .22 1.21l.04.04a1.33 1.33 0 1 1-1.89 1.89l-.04-.04a1.1 1.1 0 0 0-1.21-.22 1.1 1.1 0 0 0-.67 1.01v.11a1.33 1.33 0 1 1-2.67 0v-.06A1.1 1.1 0 0 0 5.37 13a1.1 1.1 0 0 0-1.21.22l-.04.04a1.33 1.33 0 1 1-1.89-1.89l.04-.04A1.1 1.1 0 0 0 2.5 10a1.1 1.1 0 0 0-1.01-.67H1.33a1.33 1.33 0 0 1 0-2.67h.06A1.1 1.1 0 0 0 2.5 5.37a1.1 1.1 0 0 0-.22-1.21l-.04-.04a1.33 1.33 0 1 1 1.89-1.89l.04.04A1.1 1.1 0 0 0 5.37 2.5h.04A1.1 1.1 0 0 0 6 1.49V1.33a1.33 1.33 0 0 1 2.67 0v.06a1.1 1.1 0 0 0 .67 1.01 1.1 1.1 0 0 0 1.21-.22l.04-.04a1.33 1.33 0 1 1 1.89 1.89l-.04.04a1.1 1.1 0 0 0-.22 1.21v.04a1.1 1.1 0 0 0 1.01.67h.16a1.33 1.33 0 0 1 0 2.67h-.06a1.1 1.1 0 0 0-1.01.67Z"/>
      </svg>
    </button>
    <button class="action-btn" id="docs-link" title="Documentation">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 13V3a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v10l-3-2-2 2-2-2-2 2-3-2Z"/>
        <path d="M5 5h6M5 8h4"/>
      </svg>
    </button>
    <button class="action-btn" id="signout-link" title="Sign out">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 14H3.33A1.33 1.33 0 0 1 2 12.67V3.33A1.33 1.33 0 0 1 3.33 2H6"/>
        <polyline points="10.67 11.33 14 8 10.67 4.67"/>
        <line x1="14" y1="8" x2="6" y2="8"/>
      </svg>
    </button>
  </div>

  <!-- Consolidated status footer -->
  <div class="status-footer" id="status-footer">
    <div class="sf-row">
      <span class="sf-dot" id="sf-conn-dot"></span>
      <span class="sf-label" id="sf-conn-label">Connecting...</span>
      <span class="sf-spacer"></span>
      <span class="sf-versions-stacked" id="sf-versions"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
